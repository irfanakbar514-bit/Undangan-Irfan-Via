<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Irfan & Via</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="cover" class="cover">
        <p data-aos="fade-down">THE WEDDING OF</p>
        <h1 data-aos="zoom-in">Irfan & Via</h1>
        <p data-aos="fade-up">Kamis, 31 Desember 2026</p>
        <button class="btn-open" onclick="openInvitation()">BUKA UNDANGAN</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="assets/audio/instrumental-minang.mp3" type="audio/mpeg">
    </audio>
    <button id="music-btn" onclick="toggleMusic()">🎵</button>

    <main class="main-content">
        <section id="couple">
            <h2 class="title" data-aos="fade-up">Mempelai</h2>
            <div class="couple-card" data-aos="fade-right">
                <h2 class="couple-name">Irfan Ardiansyah</h2>
                <p class="parent">Putra dari Bapak [Nama] & Ibu [Nama]</p>
            </div>
            <h3 class="ampersand">&</h3>
            <div class="couple-card" data-aos="fade-left">
                <h2 class="couple-name">Silvia Putri</h2>
                <p class="parent">Putri dari Bapak [Nama] & Ibu [Nama]</p>
            </div>
        </section>

        <section id="location">
            <h2 class="title" data-aos="fade-up">Lokasi Acara</h2>
            <p>Gedung Balai Kota Payakumbuh</p>
            <div class="map-wrapper" data-aos="zoom-in">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.7441541065!2d100.6288!3d-0.22!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMMKwMTMnMTIuMCJTIDEwMMKwMzcnNDMuNyJF!5e0!3m2!1sid!2sid!4v1620000000000" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <a href="https://maps.app.goo.gl/xxxxx" target="_blank" class="btn-map">Buka Google Maps</a>
        </section>

        <section id="gift">
            <h2 class="title" data-aos="fade-up">Digital Gift</h2>
            <div class="gift-card" data-aos="flip-up">
                <span class="bank-name">BANK BCA</span>
                <span id="rekBCA" class="acc-number">8105551234</span>
                <p>a.n Irfan Ardiansyah</p>
                <button class="btn-copy" id="btnCopy" onclick="copyAccount()">SALIN REKENING</button>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
